version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: nqobileq_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_DATABASE: nqobileq_db
      MYSQL_USER: nqobileq_user
      MYSQL_PASSWORD: userpassword123
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  web:
    build: .
    container_name: nqobileq_web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_USER=nqobileq_user
      - DB_PASSWORD=userpassword123
      - DB_NAME=nqobileq_db

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: nqobileq_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 100M
    depends_on:
      - db

volumes:
  db_data: